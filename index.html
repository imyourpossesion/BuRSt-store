<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burst Store</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
      .container {
        --uib-size: 55px;
        --uib-color: white;
        --uib-speed: 1s;
        --uib-dot-size: calc(var(--uib-size) * 0.18);
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        height: calc(var(--uib-size) * 0.5);
        width: var(--uib-size);
        margin: 25px auto; 
      }

      .dot {
        flex-shrink: 0;
        width: calc(var(--uib-size) * 0.17);
        height: calc(var(--uib-size) * 0.17);
        border-radius: 50%;
        background-color: var(--uib-color);
        transition: background-color 0.3s ease;
      }

      .dot:nth-child(1) {
        animation: jump var(--uib-speed) ease-in-out calc(var(--uib-speed) * -0.45) infinite;
      }

      .dot:nth-child(2) {
        animation: jump var(--uib-speed) ease-in-out calc(var(--uib-speed) * -0.3) infinite;
      }

      .dot:nth-child(3) {
        animation: jump var(--uib-speed) ease-in-out calc(var(--uib-speed) * -0.15) infinite;
      }

      .dot:nth-child(4) {
        animation: jump var(--uib-speed) ease-in-out infinite;
      }

      @keyframes jump {
        0%, 100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-200%);
        }
      }
    </style>
</head>

<body>
    <div class="fondo-repetido"></div>

    <div id="loading">
        <div class="spinner"></div>
    </div>

    <div id="todo-el-contenido">
<div id="loading">
    <img src="./img/BuRSt.png" class="logo-img1">
    
    <div class="container">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
</div>

<div id="todo-el-contenido" style="display: none;">

    <div class="barra">
       <a href="index.html"> <img src="./img/home.png" class="boton"></a>
       <a href="info.html"> <img src="./img/about.png" class="boton"> </a>
       <a href="contactos.html"> <img src="./img/contacto.png" class="boton"></a>
    </div>

    <div id="contenido-titulo">
        <h1>Bienvenido</h1>
    </div>

    <img src="./img/BuRSt2.png" class="logo-img2">

    <div class="contenedor-novedades">
        <h2>Novedades</h2>
        <div class="carrusel">
            <button onclick="anterior()">◀</button>
            <img id="imagenCarrusel" src="./img/banner1.png">
            <button onclick="siguiente()">▶</button>
        </div>
    </div>

    <br><br><br><br>

    <div class="producto">
      <a href="compra.html"><img src="./img/polkadotbag.jpg" class="foto-producto"></a>

      <a href="compra.html"><img src="https://i.postimg.cc/FHXdBMCb/IMG-3639.jpg" class="foto-producto"></a>
      <h2>mañana</h2>
      <p>$25</p>
      <br><br>
      
      <a href="compra.html"><img src="https://i.postimg.cc/vBKDLk62/IMG-2726.jpg" class="foto-producto"></a>
      <h2>uwu</h2>
      <p>$25</p>
    </div>

</div>

<script>
// Cambiado a "block" para asegurar que los elementos caigan uno debajo del otro naturalmente
setTimeout(function() {
    document.getElementById("loading").style.display = "none";
    document.getElementById("todo-el-contenido").style.display = "block";
}, 2000);

const imagenes = [
    "./img/banner1.png",
    "./img/banner2.png",
    "./img/banner3.png"
];

let actual = 0;

function cambiarImagen(){
    const img = document.getElementById("imagenCarrusel");
    img.classList.remove("fade");
    void img.offsetWidth;
    img.src = imagenes[actual];
    img.classList.add("fade");
}

function siguiente(){
    actual++;
    if(actual >= imagenes.length){
        actual = 0;
    }
    cambiarImagen();
}

function anterior(){
    actual--;
    if(actual < 0){
        actual = imagenes.length - 1;
    }
    cambiarImagen();
}
</script>

</body>
</html>
