<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego - Decorar Cartera</title>
    <link rel="stylesheet" href="juego.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <div class="barra">
       <a href="../index.html"> <img src="../img/home.png" class="boton"></a>
       <a href="../info.html"> <img src="../img/about.png" class="boton"> </a>
       <a href="../contactos.html"> <img src="../img/contacto.png" class="boton"></a>
       <a href="juego.html"> <img src="../img/juego.png" class="boton"></a>
    </div>

    <h1>¡Decora tu Bag!</h1>

    <div class="controles">
        <button onclick="cambiarCartera('../img/polkadotbag.jpg')">Polkadot Bag</button>
        <button onclick="cambiarCartera('../img/birkin.jpg')">Birkin Bag</button>
        <button onclick="cambiarCartera('../img/placeholder.png')">Modelo Extra</button>
    </div>

    <div class="controles-fondo">
        <button onclick="cambiarFondo('lb')">Fondo Cielo</button>
        <button onclick="cambiarFondo('pink')">Fondo Rosa</button>
        <button onclick="cambiarFondo('red')">Fondo Rojo</button>
        <button onclick="cambiarFondo('yellow')">Fondo Amarillo</button>
    </div>

    <div id="contenedor-principal">
        <div id="cartera-zona">
            <img src="../img/polkadotbag.jpg" id="cartera-fondo">
        </div>

        <div id="charms-disponibles">
            <h3>Charms</h3>
            <img src="../img/placeholder.png" class="draggable" draggable="true">
            <img src="../img/placeholder.png" class="draggable" draggable="true">
            <img src="../img/placeholder.png" class="draggable" draggable="true">
            <img src="../img/placeholder.png" class="draggable" draggable="true">
            <img src="../img/placeholder.png" class="draggable" draggable="true">
            <img src="../img/placeholder.png" class="draggable" draggable="true">
        </div>
    </div>

    <button onclick="limpiar()">Limpiar Cartera</button>

    <script src="game.js"></script>
