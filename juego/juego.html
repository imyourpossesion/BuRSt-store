<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego - Decorar Cartera</title>
    <link rel="stylesheet" href="juego.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-yellow">

    <div class="barra">
       <a href="../index.html"> <img src="../img/home.png" class="boton"></a>
       <a href="../info.html"> <img src="../img/about.png" class="boton"> </a>
       <a href="../contactos.html"> <img src="../img/contacto.png" class="boton"></a>
       <a href="juego.html"> <img src="../img/juego.png" class="boton"></a>
    </div>

    <h1>¡Decora tu Bag!</h1>

    <div class="aviso-movil">
        <p>📱 <strong>SOLO PARA CELULAR:</strong> Toca dos veces y arrastra para mover el charm.</p>
    </div>

    <div class="controles">
        <button onclick="cambiarCartera('../img/polkadotbag.jpg')">Bonita Bag</button>
        <button onclick="cambiarCartera('../img/birkin.jpg')">Demure Bag</button>
        <button onclick="cambiarCartera('../img/placeholder.jpg')">Modelo Extra</button>
    </div>

    <div class="controles-fondo">
        <button onclick="cambiarFondo('yellow')">Soft</button>
        <button onclick="cambiarFondo('lb')">Sky</button>
        <button onclick="cambiarFondo('pink')">Sakura</button>
        <button onclick="cambiarFondo('red')">Vampire</button>
    </div>

    <div id="contenedor-principal">
        <div id="cartera-zona">
            <img src="../img/polkadotbag.jpg" id="cartera-fondo">
        </div>

        <div id="charms-disponibles">
            <h3>Charms</h3>
            <img src="/img/c1.png" class="draggable">
            <img src="/img/c2.png" class="draggable">
            <img src="/img/c3.png" class="draggable">
            <img src="/img/c4.png" class="draggable">
            <img src="/img/c5.png" class="draggable">
            <img src="/img/c6.png" class="draggable">
            <img src="/img/c7.png" class="draggable">
            <img src="/img/c8.png" class="draggable">
        </div>
    </div>

    <button class="boton-accion" onclick="limpiar()">Limpiar Cartera</button>

    <script src="game.js"></script>
</body>
</html>
